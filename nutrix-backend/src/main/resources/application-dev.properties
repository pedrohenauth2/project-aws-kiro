# ============================================================
# NUTRIX - Configuração de Desenvolvimento (H2 em memória)
# ============================================================

# Database Configuration (H2 em memória para desenvolvimento)
spring.datasource.url=jdbc:h2:mem:nutrixdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (para debug)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=BN7f1qJz2YSQEoL3xlR9C0k4mrDtKM6cpjAgGweIyiXvUu5dHasT8VnZFPOWbh
jwt.expiration-ms=86400000

# Server Configuration
server.port=8080

# Logging
logging.level.com.nutrix=INFO
logging.level.org.springframework.security=DEBUG