# ============================================================
# NUTRIX - Production Configuration (Render)
# ============================================================

# Database - lido das variaveis de ambiente do Render
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# CORS - dominio do frontend na Vercel
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://*.vercel.app}

# Logging reduzido em producao
logging.level.com.nutrix=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
