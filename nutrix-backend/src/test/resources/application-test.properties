# ============================================================
# NUTRIX - Test Configuration (Testcontainers)
# ============================================================

# Testcontainers PostgreSQL
spring.datasource.url=jdbc:tc:postgresql:15:///nutrix_test
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

# JPA Configuration for Tests
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# JWT Configuration for Tests
jwt.secret=test-secret-key-for-nutrix-application-minimum-256-bits-required
jwt.expiration-ms=3600000

# Logging for Tests
logging.level.com.nutrix=DEBUG
logging.level.org.testcontainers=INFO
