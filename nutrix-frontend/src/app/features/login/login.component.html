<div class="login-wrapper">
  <!-- Painel esquerdo - Desktop only -->
  <div class="login-hero">
    <div class="login-hero__content">
      <div class="login-hero__logo">🌿</div>
      <h1 class="login-hero__title">NUTRIX</h1>
      <p class="login-hero__tagline">Transforme seu corpo, transforme sua vida</p>
      
      <ul class="login-hero__features">
        <li class="login-hero__feature">
          <span class="login-hero__feature-icon">📊</span>
          <span>Calculadora TMB Avançada</span>
        </li>
        <li class="login-hero__feature">
          <span class="login-hero__feature-icon">💪</span>
          <span>Montador de Treinos</span>
        </li>
        <li class="login-hero__feature">
          <span class="login-hero__feature-icon">📈</span>
          <span>Acompanhamento de Progresso</span>
        </li>
      </ul>
    </div>
  </div>

  <!-- Painel direito - Formulário -->
  <div class="login-form-wrapper">
    <div class="login-form-container">
      <h2 class="login-form__title">Bem-vindo de volta</h2>
      <p class="login-form__subtitle">Faça login para continuar</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <!-- Campo Usuário -->
        <div class="form-group">
          <label for="username" class="form-group__label">Usuário</label>
          <input
            type="text"
            id="username"
            class="form-control"
            [class.form-control--error]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
            formControlName="username"
            placeholder="Digite seu usuário"
            aria-label="Campo de usuário"
          />
          <div 
            class="error-message" 
            *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
          >
            Usuário é obrigatório
          </div>
        </div>

        <!-- Campo Senha -->
        <div class="form-group">
          <label for="password" class="form-group__label">Senha</label>
          <input
            type="password"
            id="password"
            class="form-control"
            [class.form-control--error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            formControlName="password"
            placeholder="Digite sua senha"
            aria-label="Campo de senha"
          />
          <div 
            class="error-message" 
            *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          >
            Senha é obrigatória
          </div>
        </div>

        <!-- Botão Entrar -->
        <button
          type="submit"
          class="btn btn-primary login-form__submit"
          [disabled]="loginForm.invalid || isLoading"
        >
          <span *ngIf="!isLoading">Entrar</span>
          <span *ngIf="isLoading" class="spinner spinner-sm"></span>
          <span *ngIf="isLoading">Entrando...</span>
        </button>
      </form>
    </div>
  </div>
</div>
