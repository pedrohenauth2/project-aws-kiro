<nav class="navbar">
  <div class="navbar__container">
    <!-- Logo -->
    <div class="navbar__logo">
      <a routerLink="/dashboard" class="navbar__logo-link">
        <div class="navbar__logo-icon" [innerHTML]="getAppleLogo()"></div>
        <span class="navbar__logo-text">NUTRIX</span>
      </a>
    </div>

    <!-- User Info and Logout -->
    <div class="navbar__actions">
      <!-- Desktop: Full name -->
      <div class="navbar__user-info">
        <div class="navbar__avatar">{{ userInitial }}</div>
        <span class="navbar__user-name">{{ fullName }}</span>
      </div>

      <!-- Logout Button -->
      <button 
        class="navbar__logout-btn"
        (click)="logout()"
        aria-label="Sair da aplicação"
      >
        <span class="navbar__logout-icon">🚪</span>
        <span class="navbar__logout-text">Sair</span>
      </button>
    </div>
  </div>
</nav>
